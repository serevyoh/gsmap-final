<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>GS PRUEBAS GENERAL</title>
    <link
  href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap"
  rel="stylesheet"
><link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.7.2/css/all.css'>
<link rel='stylesheet' href='https://nagoshiashumari.github.io/Rpg-Awesome/stylesheets/rpg-awesome.min.css'>
<link rel='stylesheet' href='https://solrainha.github.io/honeybee/honeybee.css'>
<link rel='stylesheet' href='https://dl.dropbox.com/s/vpi3f9s7nhpe7v7/honeybee.css'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h1>Gran Siniestra</h1>
      <div id="ornamento"></div>
<p id="subtituloMapa">
  Explora el mundo dando click en los iconos del mapa.
</p>

    <div id="info">
      <h2 id="nombre">Selecciona una localización</h2>
      <div id="descripcion"></div>
    </div>

<div id="botones">

  <div id="filtrosCategorias">

<div class="categoriaFiltro" data-categoria="politica">
  <i class="ra ra-castle-flag ra-lg"></i>
</div>

<div class="categoriaFiltro" data-categoria="vegetacion">
  <i class="ra ra-leaf ra-lg"></i>
</div>

<div class="categoriaFiltro" data-categoria="minerales">
  <i class="ra ra-mining-diamonds ra-lg"></i>
</div>

<div class="categoriaFiltro" data-categoria="monstruos">
  <i class="ra ra-bird-claw ra-lg"></i>
</div>

<div class="categoriaFiltro" data-categoria="comida">
  <i class="ra ra-apple ra-lg"></i>
</div>

  </div>

  <div id="panelFiltros"></div>

  <button id="toggleAdmin">
    ⚙ Herramientas administrativas
  </button>

  <div id="adminPanel">

    <div id="selectorFaccion">

      <h3>Facción activa</h3>

      <div class="faccion" data-color="#a11011">Kal'arch</div>
      <div class="faccion" data-color="#ffa900">Reshk'arch</div>
      <div class="faccion" data-color="#a6b7c4">Rehgis</div>
      <div class="faccion" data-color="#c93457">Blavyr</div>
      <div class="faccion" data-color="#0054ad">Vaelekin</div>
      <div class="faccion" data-color="#1e7329">Gallarion</div>
      <div class="faccion" data-color="#008791">A'Drien</div>
      <div class="faccion" data-color="#6951c9">Ve'anor</div>
      <div class="faccion" data-color="#b545de">Reden</div>
      <div class="faccion" data-color="#731010">Vampiros</div>

    </div>

    <button id="modoEdicion">
      Modo edición
    </button>

    <button id="guardarMapa">
      Guardar
    </button>

    <button id="exportarMapa">
      Exportar JSON
    </button>

    <button id="importarMapa">
      Importar JSON
    </button>

    <input
      type="file"
      id="importFile"
      accept=".json"
      style="display:none;"
    >

  </div>

</div>
    <div id="discordBox">

  <div id="discordTitulo">
    ÚNETE A GRAN SINIESTRA
  </div>

  <a
    id="discordLink"
    href="https://discord.gg/3RP4Jxv9Rh"
    target="_blank"
  >

    <i class="fab fa-discord"></i>

  </a>

</div>
  </div>

  <!-- MAPA -->
  <div id="mapa-container">
    <div id="mapa-inner">
      <img src="https://i.imgur.com/Mr40FCw.jpeg" id="mapa">
      <div id="gridOverlay"></div>
    </div>
  </div>

</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
